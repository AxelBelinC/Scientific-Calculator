<!-- @startingPoint section="Calculator" subtitle="Scientific calculator with history + function grapher" viewport="730x650" -->
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Calculadora Científica</title>
<link rel="stylesheet" href="../../styles.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@300;400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="engine.js"></script>
<script src="CalcPanel.jsx" type="text/babel"></script>
<script src="CalcHistoryPanel.jsx" type="text/babel"></script>
<script src="GrapherPanel.jsx" type="text/babel"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: #111; display: flex; align-items: center; justify-content: center; font-family: 'DM Sans', 'Segoe UI', system-ui, sans-serif; }
  body { min-height: 100vh; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #333; }
  /* Prevent text selection during click */
  button { -webkit-user-select: none; user-select: none; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
// ─── App Shell ───────────────────────────────────────────────────────────────
function App() {
  const [engine]        = React.useState(() => new CalculatorEngine());
  const [showHistory,   setShowHistory]  = React.useState(false);
  const [showGrapher,   setShowGrapher]  = React.useState(false);
  const [angleMode,     setAngleMode]    = React.useState('DEG');

  React.useEffect(() => {
    engine.on('angleModeChanged', () => setAngleMode(engine.angleMode));
  }, [engine]);

  // Window width: calc (400) + optional history (330) + 1px border
  const windowW = showHistory ? 731 : 400;

  return (
    <div style={{ position:'relative' }}>
      {/* ── Window chrome ── */}
      <div style={{
        width: windowW, background: '#1c1c1c',
        display: 'flex', flexDirection: 'row',
        height: 650, overflow: 'hidden',
        boxShadow: '0 8px 48px rgba(0,0,0,0.85)',
        transition: 'width 0.15s',
      }}>
        {/* Calculator panel — 400px fixed */}
        <div style={{ width: 400, flexShrink: 0, height: '100%' }}>
          <CalcPanel
            engine={engine}
            onToggleHistory={() => setShowHistory(h => !h)}
            onOpenGrapher={() => setShowGrapher(true)}
          />
        </div>

        {/* History panel — slides in */}
        {showHistory && (
          <div style={{ width: 330, borderLeft: '1px solid #2a2a2a', height: '100%', flexShrink: 0 }}>
            <CalcHistoryPanel engine={engine} />
          </div>
        )}
      </div>

      {/* ── Grapher overlay ── */}
      {showGrapher && (
        <GrapherPanel
          onClose={() => setShowGrapher(false)}
          angleMode={angleMode}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
