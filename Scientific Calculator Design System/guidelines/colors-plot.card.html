<!-- @dsCard group="Colors" viewport="700x90" name="Grapher Plot Palette" subtitle="Six ordered colors for multi-function plots" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--color-bg); font-family: var(--font-sans); padding: 16px; }
  .row { display: flex; gap: 8px; }
  .swatch { flex: 1; height: 48px; border-radius: 2px; position: relative; }
  .label { position: absolute; bottom: 5px; left: 6px; font-size: 9px; color: rgba(255,255,255,0.7); }
</style>
</head>
<body>
<div class="row">
  <div class="swatch" style="background:var(--color-plot-1)"><span class="label">#00a0ff</span></div>
  <div class="swatch" style="background:var(--color-plot-2)"><span class="label">#ff5050</span></div>
  <div class="swatch" style="background:var(--color-plot-3)"><span class="label">#50c850</span></div>
  <div class="swatch" style="background:var(--color-plot-4)"><span class="label">#ffaa00</span></div>
  <div class="swatch" style="background:var(--color-plot-5)"><span class="label">#b450ff</span></div>
  <div class="swatch" style="background:var(--color-plot-6)"><span class="label">#00dcc8</span></div>
</div>
</body>
</html>
