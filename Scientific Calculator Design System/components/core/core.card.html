<!-- @dsCard group="Components" viewport="700x420" name="Core Components" subtitle="CalcButton · Display · HistoryItem · FunctionChip" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@300;400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--color-bg); font-family: var(--font-sans); padding: 16px; }
  .section { margin-bottom: 18px; }
  .section-title { font-size: 9px; color: #444; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
  .row { display: flex; gap: 4px; align-items: stretch; }
  .key-wrap { flex: 1; height: 40px; }
  .key-wrap-sm { width: 60px; height: 32px; }
  .key-wrap-tall { width: 60px; height: 82px; }
  .display-wrap { background: var(--color-display-bg); position: relative; width: 100%; }
  .hist-col { display: flex; flex-direction: column; gap: 0; width: 240px; background: var(--color-history-bg); padding: 6px; }
  .hist-title { font-size: 11px; font-weight: 600; color: var(--color-text-secondary); padding: 4px 4px 8px; }
  .chip-row { display: flex; gap: 6px; flex-wrap: wrap; padding: 4px 0; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const ns = window.ScientificCalculatorDesignSystem_00fb6d || window.ScientificCalculatorDesignSystem || {};
const { CalcButton, Display, HistoryItem, FunctionChip } = ns;

function Demo() {
  const PLOT_COLORS = ['var(--color-plot-1)','var(--color-plot-2)','var(--color-plot-3)'];
  return (
    <div>
      {/* CalcButton variants */}
      <div className="section">
        <div className="section-title">CalcButton — all roles</div>
        <div className="row">
          {[
            {label:'7',    role:'default'},
            {label:'÷',    role:'operator'},
            {label:'sin',  role:'scientific',size:'sm'},
            {label:'=',    role:'equals'},
            {label:'MR',   role:'memory',size:'sm'},
            {label:'C',    role:'utility'},
            {label:'DEG',  role:'toggle',size:'xs'},
            {label:'MR',   role:'memory',size:'sm',disabled:true},
          ].map((p,i) => (
            <div key={i} className="key-wrap" style={{height: 40}}>
              <CalcButton {...p} />
            </div>
          ))}
        </div>
      </div>

      {/* Display */}
      <div className="section">
        <div className="section-title">Display</div>
        <div style={{display:'flex', gap:8}}>
          <div className="display-wrap" style={{flex:1}}>
            <Display value="3.14159265" expression="π =" angleMode="DEG" />
          </div>
          <div className="display-wrap" style={{flex:1}}>
            <Display value="Entrada inválida" expression="1 ÷ 0 =" />
          </div>
        </div>
      </div>

      {/* HistoryItem */}
      <div className="section">
        <div className="section-title">HistoryItem</div>
        <div className="hist-col">
          <div className="hist-title">Historial</div>
          <HistoryItem expression="sin(45) × 2" result="1.41421356" />
          <HistoryItem expression="log(1000)" result="3" />
          <HistoryItem expression="12 ^ (1/3)" result="2.28942849" />
        </div>
      </div>

      {/* FunctionChip */}
      <div className="section">
        <div className="section-title">FunctionChip</div>
        <div className="chip-row">
          <FunctionChip expression="sin(x)" color="var(--color-plot-1)" onRemove={() => {}} />
          <FunctionChip expression="x^2 - 4" color="var(--color-plot-2)" onRemove={() => {}} />
          <FunctionChip expression="cos(x) + 1" color="var(--color-plot-3)" />
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
